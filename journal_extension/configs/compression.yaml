# harmonize-and-compress configuration
# extension b: joint harmonization + neural compression

experiment_name: sa_cyclegan_25d_compressed
seed: 42
deterministic: false

# data paths
brats_dir: /home/cc/neuroscope/preprocessed/brats
upenn_dir: /home/cc/neuroscope/preprocessed/upenn
output_dir: /data/experiments/journal_extension/compression

# generator architecture
ngf: 64
ndf: 64
n_residual_blocks: 9
use_attention: true
use_cbam: true
input_channels: 12
output_channels: 4
attention_layers: [3, 4, 5]

# compression settings
entropy_model_type: factorized  # factorized or hyperprior
num_hyper_channels: 128
lambda_rate: 0.01  # rate-distortion tradeoff (sweep: 0.001, 0.005, 0.01, 0.05, 0.1)

# warmup: train without compression for first N epochs to stabilize
compression_warmup_epochs: 20

# training
epochs: 200
batch_size: 32
image_size: 128
num_workers: 16
lr_G: 5.0e-05
lr_D: 5.0e-05
beta1: 0.5
beta2: 0.999
scheduler_type: cosine
warmup_epochs: 5
min_lr: 1.0e-06

# loss weights
lambda_cycle: 10.0
lambda_identity: 5.0
lambda_ssim: 1.0
lambda_gradient: 1.0

# training stability
gradient_clip_norm: 1.0
use_amp: true

# logging
validate_every: 1
save_every: 5
log_every_n_steps: 100
