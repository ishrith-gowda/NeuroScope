# multi-domain sa-cyclegan-2.5d configuration
# extension c: n>2 domain harmonization with adain conditioning
# domains split by real scanner acquisition parameters from tcia metadata

experiment_name: sa_cyclegan_25d_multidomain
seed: 42
deterministic: false

# data paths (scanner-based domain split)
data_dirs:
  brats: /home/cc/neuroscope/preprocessed/brats
  upenn_3t_triotim: /home/cc/neuroscope/preprocessed/upenn
  upenn_3t_other: /home/cc/neuroscope/preprocessed/upenn
  upenn_15t: /home/cc/neuroscope/preprocessed/upenn
output_dir: /data/experiments/journal_extension/multi_domain

# domain split file (subject ids per domain from acquisition metadata)
domain_split_file: /home/cc/neuroscope/data/metadata/multi_domain_split.json

# domain configuration
n_domains: 4
domain_names: [brats, upenn_3t_triotim, upenn_3t_other, upenn_15t]
domain_embed_dim: 64
style_dim: 256

# generator architecture
ngf: 64
ndf: 64
n_residual_blocks: 9
use_attention: true
use_cbam: true
input_channels: 12
output_channels: 4
attention_layers: [3, 4, 5]

# training
epochs: 200
batch_size: 32
image_size: 128
num_workers: 16
lr_G: 5.0e-05
lr_D: 5.0e-05
beta1: 0.5
beta2: 0.999
scheduler_type: cosine
warmup_epochs: 5
min_lr: 1.0e-06

# loss weights
lambda_cycle: 10.0
lambda_identity: 5.0
lambda_ssim: 1.0
lambda_cls: 1.0  # domain classification loss weight
lambda_rec: 10.0  # reconstruction loss weight

# training stability
gradient_clip_norm: 1.0
use_amp: true

# logging
validate_every: 1
save_every: 5
