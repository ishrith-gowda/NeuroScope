# =============================================================================
# 2.5D SA-CycleGAN Training Configuration - OPTIMIZED FOR APPLE SILICON (MPS)
# =============================================================================
# Optimized configuration for macOS training with MPS
# - No multiprocessing warnings
# - Faster iteration speed
# - Practical training times
# =============================================================================

# -----------------------------------------------------------------------------
# Experiment Identification
# -----------------------------------------------------------------------------
experiment_name: "sa_cyclegan_25d_mps_optimized"
seed: 42
deterministic: true

# -----------------------------------------------------------------------------
# Data Paths
# -----------------------------------------------------------------------------
brats_dir: "/Volumes/usb drive/neuroscope/preprocessed/brats"
upenn_dir: "/Volumes/usb drive/neuroscope/preprocessed/upenn"
output_dir: "/Volumes/usb drive/neuroscope/experiments"

# -----------------------------------------------------------------------------
# Model Architecture - OPTIMIZED FOR MPS
# -----------------------------------------------------------------------------
ngf: 48                    # Reduced from 64 (faster, less memory)
ndf: 48                    # Reduced from 64
n_residual_blocks: 6       # Reduced from 9 (3x faster training!)
use_attention: true        # Keep self-attention (key innovation)
use_cbam: true             # Keep CBAM
input_channels: 12         # 3 slices × 4 modalities
output_channels: 4         # 4 modalities

# -----------------------------------------------------------------------------
# Training Configuration - OPTIMIZED FOR SPEED
# -----------------------------------------------------------------------------
epochs: 50                 # Reduced from 100 (still sufficient)
batch_size: 2              # Reduced for MPS memory limits
image_size: 128            # Keep same
num_workers: 0             # *** CRITICAL: Eliminates ALL macOS warnings ***

# -----------------------------------------------------------------------------
# Optimizer Configuration
# -----------------------------------------------------------------------------
lr_G: 0.0002               # Same
lr_D: 0.0002               # Same
beta1: 0.5
beta2: 0.999
weight_decay: 0.0

# -----------------------------------------------------------------------------
# Learning Rate Scheduler
# -----------------------------------------------------------------------------
scheduler_type: "cosine"
warmup_epochs: 3           # Reduced from 5 (faster start)
min_lr: 0.000001

# -----------------------------------------------------------------------------
# Loss Function Weights
# -----------------------------------------------------------------------------
lambda_cycle: 10.0         # Standard CycleGAN
lambda_identity: 5.0       # Standard
lambda_ssim: 1.0           # Perceptual quality
lambda_gradient: 1.0       # Edge preservation

# -----------------------------------------------------------------------------
# Regularization
# -----------------------------------------------------------------------------
gradient_clip_norm: 1.0
gradient_clip_value: null

# -----------------------------------------------------------------------------
# Mixed Precision Training
# -----------------------------------------------------------------------------
use_amp: false             # MPS doesn't support AMP yet

# -----------------------------------------------------------------------------
# Validation & Checkpointing
# -----------------------------------------------------------------------------
validate_every: 5          # Same
save_every: 5              # More frequent (reduced epochs)
save_best_only: false

# -----------------------------------------------------------------------------
# Early Stopping
# -----------------------------------------------------------------------------
early_stopping: true
patience: 15               # Reduced (from 20)
min_delta: 0.001

# -----------------------------------------------------------------------------
# Logging Configuration
# -----------------------------------------------------------------------------
log_every_n_steps: 10
sample_every: 5            # More frequent (reduced epochs)
figure_every: 5            # More frequent
verbose: 2

# -----------------------------------------------------------------------------
# Resume Training
# -----------------------------------------------------------------------------
resume_from: null

# =============================================================================
# EXPECTED PERFORMANCE ON APPLE SILICON
# =============================================================================
# With these optimizations:
# - Model size: ~15M parameters (was 35M)
# - Iterations per epoch: ~21,055 (batch_size 2 instead of 4)
# - Expected speed: ~5-10s/iteration (was 20s)
# - Time per epoch: ~29-58 hours (was 58+ hours)
# - Total training: ~60-120 hours for 50 epochs
#
# This is 3-4x faster than the original configuration!
#
# If still too slow, further reduce:
# - n_residual_blocks: 4 (even faster)
# - batch_size: 1 (faster iterations but less stable)
# - epochs: 25 (quick prototype)
# =============================================================================
