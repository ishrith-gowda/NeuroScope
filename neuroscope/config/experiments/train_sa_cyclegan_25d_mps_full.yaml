# =============================================================================
# 2.5D SA-CycleGAN Training - FULL QUALITY (MPS Compatible)
# =============================================================================
# Full-quality configuration with ONLY macOS warning fixes
# Model architecture and training unchanged for publication quality
# =============================================================================

# -----------------------------------------------------------------------------
# Experiment Identification
# -----------------------------------------------------------------------------
experiment_name: "sa_cyclegan_25d_full_quality"
seed: 42
deterministic: true

# -----------------------------------------------------------------------------
# Data Paths
# -----------------------------------------------------------------------------
brats_dir: "/Volumes/usb drive/neuroscope/preprocessed/brats"
upenn_dir: "/Volumes/usb drive/neuroscope/preprocessed/upenn"
output_dir: "/Volumes/usb drive/neuroscope/experiments"

# -----------------------------------------------------------------------------
# Model Architecture - FULL QUALITY (NO COMPROMISES)
# -----------------------------------------------------------------------------
ngf: 64                    # UNCHANGED - Full capacity
ndf: 64                    # UNCHANGED - Full capacity
n_residual_blocks: 9       # UNCHANGED - Full depth
use_attention: true        # Your key innovation
use_cbam: true             # Full attention mechanisms
input_channels: 12         # 3 slices × 4 modalities
output_channels: 4         # 4 modalities

# -----------------------------------------------------------------------------
# Training Configuration
# -----------------------------------------------------------------------------
epochs: 100                # UNCHANGED - Full training
batch_size: 4              # Reduced from 8 for MPS memory
image_size: 128            # Standard resolution
num_workers: 0             # *** ONLY CHANGE: Fixes ALL macOS warnings ***

# -----------------------------------------------------------------------------
# Optimizer Configuration
# -----------------------------------------------------------------------------
lr_G: 0.0002
lr_D: 0.0002
beta1: 0.5
beta2: 0.999
weight_decay: 0.0

# -----------------------------------------------------------------------------
# Learning Rate Scheduler
# -----------------------------------------------------------------------------
scheduler_type: "cosine"
warmup_epochs: 5
min_lr: 0.000001

# -----------------------------------------------------------------------------
# Loss Function Weights
# -----------------------------------------------------------------------------
lambda_cycle: 10.0
lambda_identity: 5.0
lambda_ssim: 1.0
lambda_gradient: 1.0

# -----------------------------------------------------------------------------
# Regularization
# -----------------------------------------------------------------------------
gradient_clip_norm: 1.0
gradient_clip_value: null

# -----------------------------------------------------------------------------
# Mixed Precision Training
# -----------------------------------------------------------------------------
use_amp: false             # MPS doesn't support AMP

# -----------------------------------------------------------------------------
# Validation & Checkpointing
# -----------------------------------------------------------------------------
validate_every: 5
save_every: 10
save_best_only: false

# -----------------------------------------------------------------------------
# Early Stopping
# -----------------------------------------------------------------------------
early_stopping: true
patience: 20
min_delta: 0.001

# -----------------------------------------------------------------------------
# Logging Configuration
# -----------------------------------------------------------------------------
log_every_n_steps: 10
sample_every: 10
figure_every: 10
verbose: 2

# -----------------------------------------------------------------------------
# Resume Training
# -----------------------------------------------------------------------------
resume_from: null

# =============================================================================
# REALISTIC EXPECTATIONS FOR APPLE SILICON MPS
# =============================================================================
# With this FULL-QUALITY configuration:
# - Model: 35M parameters (same as CUDA training)
# - Expected speed: ~15-20 seconds/iteration
# - Iterations per epoch: ~10,528 (batch_size 4)
# - Time per epoch: ~44-58 hours
# - Total training time: ~180-240 days for 100 epochs
#
# This is the HONEST timeline for publication-quality training on MPS.
#
# RECOMMENDATIONS:
# 1. Use cloud GPU (AWS/GCP) - 100x faster, ~$50 total cost
# 2. OR train on borrowed/lab CUDA workstation
# 3. OR do quick prototype (below) then full training on GPU
# =============================================================================

# =============================================================================
# ALTERNATIVE: Quick Prototype Configuration (Uncomment if needed)
# =============================================================================
# Use this for initial validation, then move to GPU for full training
#
# epochs: 10                # Just to verify everything works
# n_residual_blocks: 6      # Faster prototyping
# validate_every: 2
# save_every: 5
#
# Then train the FULL model (9 blocks, 100 epochs) on cloud GPU
# =============================================================================
